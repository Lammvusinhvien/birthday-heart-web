<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Happy Birthday 💖</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<canvas id="particleCanvas"></canvas>

<audio id="bgMusic" loop preload="auto">
  <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<!-- INTRO -->
<section id="intro" class="screen active">
  <div id="birthdayText">
    Chúc mừng sinh nhật Khánh Tâmm 🎂💖
  </div>
  <button id="toVideo" class="btn">Tiếp ▶</button>
</section>

<!-- VIDEO -->
<section id="video" class="screen">
  <iframe
    id="ytFrame"
    src="https://www.youtube.com/embed/G99YMstPLHk?rel=0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>

  <div class="navRow">
    <button id="backIntro" class="btn">◀ Quay lại</button>
    <button id="toEnd" class="btn">Tiếp ▶</button>
  </div>
</section>

<!-- END -->
<section id="end" class="screen">
  <h2>Em tha lỗi cho anh nhé? 💕</h2>
  <button id="backHome" class="btn">◀ Quay lại</button>
</section>

<script src="particles.js"></script>
<script src="script.js"></script>
</body>
</html>
