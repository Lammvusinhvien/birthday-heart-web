<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Birthday for Khánh Tâmm</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <audio id="bgMusic" loop preload="auto">
    <source src="assets/music.mp3" type="audio/mpeg">
  </audio>

  <section id="introScreen" class="screen active">
    <div id="introApp"></div>

    <div class="nav bottom-right">
      <button id="btnIntroNext" class="btn">Tiếp ▶</button>
    </div>
  </section>

  <section id="videoScreen" class="screen">
    <div class="videoWrap">
      <iframe
        id="ytFrame"
        src="https://www.youtube.com/embed/G99YMstPLHk?rel=0"
        allow="autoplay; encrypted-media"
        allowfullscreen>
      </iframe>
    </div>

    <div class="nav bottom-center">
      <button id="btnVideoBack" class="btn">◀ Quay lại</button>
      <button id="btnVideoNext" class="btn">Tiếp ▶</button>
    </div>
  </section>

  <section id="endScreen" class="screen">
    <div class="endText">Em tha lỗi cho anh nhé? 💕</div>

    <div class="nav bottom-center">
      <button id="btnEndBack" class="btn">◀ Quay lại</button>
    </div>
  </section>

  <script type="module" src="intro-heart.js"></script>
  <script src="script.js"></script>
</body>
</html>
